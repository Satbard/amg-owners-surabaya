services:
  app:
    build: .
    container_name: amg-laravel-app
    restart: unless-stopped
    ports:
      - "9000:80"
    volumes:
      - ./:/var/www
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: amg-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: amg_owners
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: amguser
      MYSQL_PASSWORD: amgpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
