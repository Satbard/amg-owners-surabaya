services:
  app:
    build: .
    container_name: amg-laravel-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    container_name: amg-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/:/etc/nginx/conf.d/
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: amg-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: amg_owners
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: amguser
      MYSQL_PASSWORD: amgpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
